INHERIT: mkdocs.yml
plugins:
  - social:
      cards_layout_dir: layouts
      cards_layout: custom
  - search
  - rss: # non-standard
      length: 200
  - awesome-pages # non-standard
  - git-revision-date-localized:
      enable_creation_date: true
  - git-committers: # non-standard
      repository: Hacking-the-Cloud/hackingthe.cloud
      branch: main
      token: !ENV GH_TOKEN
      docs_path: content/
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - redirects:
      redirect_maps:
        'aws/post_exploitation/aws_consoler.md': 'aws/post_exploitation/create_a_console_session_from_iam_credentials.md'
        'ai-llm/exploitation/claude_magic_string_denial_of_service.md': 'ai-llm/deprecated/claude_magic_string_denial_of_service.md'
  - glightbox: # non-standard
